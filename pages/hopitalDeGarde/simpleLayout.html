<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Hôpital de Garde Monitor</title>
  <style>
    :root {
      --monitor-blue: #1147d9;
      --monitor-blue-dark: #0a2d8c;
      --monitor-panel: #ffffff;
      --card-closed-bg: linear-gradient(180deg, #f7f7f7 0%, #ececec 100%);
      --card-closed-text: #1f2937;
      --card-active-bg: linear-gradient(180deg, #154ff3 0%, #0a2f9f 100%);
      --card-active-text: #ffffff;
      --shadow-soft: 0 14px 28px rgba(10, 33, 104, 0.16);
      --shadow-card: 0 8px 14px rgba(10, 33, 104, 0.1);
      --radius-panel: 20px;
      --radius-card: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Arial Rounded MT Bold", "Trebuchet MS", Arial, sans-serif;
      background:
        radial-gradient(circle at top, #2b62ff 0%, #0c2d9b 36%, #071958 100%);
      color: #0f172a;
    }

    body {
      min-height: 100vh;
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .monitor-shell {
      width: min(100%, 460px);
      max-width: 100%;
      border-radius: 22px;
      background: linear-gradient(180deg, #275de5 0%, #0b2788 100%);
      padding: 10px;
      box-shadow: var(--shadow-soft);
    }

    .monitor-screen {
      background: var(--monitor-panel);
      border-radius: var(--radius-panel);
      padding: 10px;
      overflow: hidden;
    }

    .monitor-title {
      margin: 0 0 10px;
      background: linear-gradient(180deg, #0b267d 0%, #081b5d 100%);
      color: #ffffff;
      text-align: center;
      font-size: clamp(1.35rem, 4vw, 1.8rem);
      line-height: 1.1;
      border-radius: 16px;
      padding: 14px 16px;
    }

    .hospital-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 4px 2px 2px;
    }

    .hospital-card {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 92px;
      border-radius: var(--radius-card);
      text-decoration: none;
      text-align: center;
      padding: 14px 16px;
      box-shadow: var(--shadow-card);
      border: 1px solid rgba(255, 255, 255, 0.75);
      transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
    }

    .hospital-card:hover,
    .hospital-card:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 16px 24px rgba(10, 33, 104, 0.18);
      outline: none;
      filter: saturate(1.08);
    }

    .hospital-card--closed {
      background: var(--card-closed-bg);
      color: var(--card-closed-text);
    }

    .hospital-card--active {
      background: var(--card-active-bg);
      color: var(--card-active-text);
    }

    .hospital-card__content {
      display: grid;
      gap: 6px;
    }

    .hospital-card__code {
      font-size: clamp(1.8rem, 6vw, 2.3rem);
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .hospital-card__status {
      font-size: clamp(1rem, 3vw, 1.2rem);
      font-weight: 700;
      line-height: 1.15;
    }

    .monitor-footer {
      margin-top: 10px;
      display: flex;
      justify-content: center;
      color: rgba(255, 255, 255, 0.92);
      font-size: 0.78rem;
      text-align: center;
    }

    @media (min-width: 900px) {
      body {
        padding: 10px;
      }

      .monitor-shell {
        width: min(100%, 1400px);
      }

      .hospital-list {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }

      .hospital-card {
        min-height: 120px;
      }
    }

    @media (min-width: 700px) and (max-height: 420px) {
      body {
        padding: 6px;
        align-items: stretch;
      }

      .monitor-shell {
        width: 100%;
        border-radius: 16px;
        padding: 8px;
      }

      .monitor-screen {
        padding: 8px;
      }

      .monitor-title {
        margin-bottom: 8px;
        padding: 10px 14px;
        font-size: clamp(1.1rem, 2.4vw, 1.5rem);
      }

      .hospital-list {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }

      .hospital-card {
        min-height: 72px;
        padding: 10px 8px;
      }

      .hospital-card__content {
        gap: 4px;
      }

      .hospital-card__code {
        font-size: clamp(1.35rem, 2.6vw, 1.9rem);
      }

      .hospital-card__status {
        font-size: clamp(0.82rem, 1.5vw, 1rem);
      }

      .monitor-footer {
        margin-top: 6px;
        font-size: 0.7rem;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
      }

      .monitor-shell {
        padding: 10px;
      }

      .monitor-screen {
        padding: 10px;
      }

      .hospital-card {
        min-height: 84px;
        padding: 14px;
      }
    }
  </style>
</head>

<body>
  <div class="monitor-shell" aria-label="Monitor hôpital de garde" role="main">
    <div class="monitor-screen">
      <h1 class="monitor-title" id="monitorTitle">Hôpital de Garde</h1>

      <div class="hospital-list">
        <a id="card-chl" class="hospital-card hospital-card--closed" href="../phoneNumbers/index.html">
          <span class="hospital-card__content">
            <span class="hospital-card__code">CHL</span>
            <span class="hospital-card__status">geschlossen</span>
          </span>
        </a>

        <a id="card-hoki" class="hospital-card hospital-card--closed" href="../phoneNumbers/index.html">
          <span class="hospital-card__content">
            <span class="hospital-card__code">HOKI</span>
            <span class="hospital-card__status">geschlossen</span>
          </span>
        </a>

        <a id="card-chdn" class="hospital-card hospital-card--active" href="../phoneNumbers/index.html">
          <span class="hospital-card__content">
            <span class="hospital-card__code">CHDN</span>
            <span class="hospital-card__status">24/7</span>
          </span>
        </a>

        <a id="card-chem" class="hospital-card hospital-card--active" href="../phoneNumbers/index.html">
          <span class="hospital-card__content">
            <span class="hospital-card__code">CHEM</span>
            <span class="hospital-card__status">24/7</span>
          </span>
        </a>
      </div>
    </div>

    <div class="monitor-footer" id="monitorFooter">Luxembourg duty monitor</div>
  </div>

  <script>
    const DEFAULT_LINKS = {
      chl: "../phoneNumbers/index.html",
      hoki: "../phoneNumbers/index.html",
      chdn: "../phoneNumbers/index.html",
      chem: "../phoneNumbers/index.html"
    };
    const cards = {
      chl: document.getElementById("card-chl"),
      hoki: document.getElementById("card-hoki"),
      chdn: document.getElementById("card-chdn"),
      chem: document.getElementById("card-chem")
    };
    const monitorFooter = document.getElementById("monitorFooter");
    let currentRenderedState = null;
    let warningBlinkOn = false;
    const CHL = "CHL";
    const HK = "HOKI";

    const params = new URLSearchParams(window.location.search);
    const linkTarget = params.get("target") || "_top";
    const title = params.get("title");

    if (title) {
      document.getElementById("monitorTitle").textContent = title;
    }

    Object.entries(cards).forEach(([key, element]) => {
      element.href = params.get(`${key}Href`) || DEFAULT_LINKS[key];
      element.target = linkTarget;
      if (linkTarget === "_blank") {
        element.rel = "noopener noreferrer";
      }
    });

    function getLuxembourgSnapshot() {
      const formatter = new Intl.DateTimeFormat("en-CA", {
        timeZone: "Europe/Luxembourg",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      });

      const parts = Object.fromEntries(
        formatter
          .formatToParts(new Date())
          .filter((part) => part.type !== "literal")
          .map((part) => [part.type, part.value])
      );

      return {
        date: new Date(
          Number(parts.year),
          Number(parts.month) - 1,
          Number(parts.day),
          Number(parts.hour),
          Number(parts.minute),
          Number(parts.second)
        ),
        dateLabel: `${parts.day}.${parts.month}.${parts.year}`
      };
    }

    function toDateKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function toUtcDayNumber(date) {
      return Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()) / 86400000;
    }

    function diffCalendarDays(a, b) {
      return toUtcDayNumber(a) - toUtcDayNumber(b);
    }

    const CENTRE_DAY_OVERRIDES = new Map([
      ["2026-01-01", [HK]],
      ["2026-04-06", [CHL]],
      ["2026-05-01", [CHL]],
      ["2026-05-14", [CHL]],
      ["2026-05-25", [HK]],
      ["2026-06-23", [CHL]]
    ]);
    const CENTRE_NIGHT_OVERRIDES = new Map([
      ["2026-01-01", HK]
    ]);

    function getCentreDayOverride(date) {
      return CENTRE_DAY_OVERRIDES.get(toDateKey(date)) || null;
    }

    function getNightHospital(date) {
      const override = CENTRE_NIGHT_OVERRIDES.get(toDateKey(date));
      if (override) {
        return override;
      }

      const refAlt = new Date(2026, 0, 2); // Jan 2, 2026 -> CHL
      const today = new Date(date.getFullYear(), date.getMonth(), date.getDate());
      const diffAlt = diffCalendarDays(today, refAlt);
      if (diffAlt < 0) {
        return CHL;
      }

      return diffAlt % 2 === 0 ? CHL : HK;
    }

    function getOppositeHospital(hospitalCode) {
      return hospitalCode === CHL ? HK : CHL;
    }

    function getDutyAnchorDate(currentDate) {
      const anchorDate = new Date(currentDate);
      if (currentDate.getHours() < 17) {
        anchorDate.setDate(anchorDate.getDate() - 1);
      }

      return anchorDate;
    }

    function getActiveCentreHospitals(currentDate) {
      const dayOfWeek = currentDate.getDay();
      const hours = currentDate.getHours();
      const grandeGarde = getNightHospital(getDutyAnchorDate(currentDate));

      if (dayOfWeek === 6 || dayOfWeek === 0) {
        const sat = new Date(currentDate);
        if (dayOfWeek === 0) {
          sat.setDate(sat.getDate() - 1);
        }

        const refSat = new Date(2026, 0, 3); // Jan 3, 2026 -> CHL
        const diffDays = diffCalendarDays(sat, refSat);
        const weeksSince = Math.floor(diffDays / 7);
        return [weeksSince % 2 === 0 ? CHL : HK];
      }

      if (dayOfWeek >= 1 && dayOfWeek <= 5 && hours >= 7 && hours < 17) {
        const centreDayOverride = getCentreDayOverride(currentDate);
        if (centreDayOverride) {
          return centreDayOverride;
        }

        return [grandeGarde, getOppositeHospital(grandeGarde)];
      }

      return [grandeGarde];
    }

    function isHospitalOpen(hospitalCode, currentDate) {
      return getActiveCentreHospitals(currentDate).includes(hospitalCode);
    }

    function getMinutesUntilClose(hospitalCode, currentDate) {
      if (!isHospitalOpen(hospitalCode, currentDate)) {
        return null;
      }

      const searchMinutes = 7 * 24 * 60;
      for (let offsetMinutes = 1; offsetMinutes <= searchMinutes; offsetMinutes += 1) {
        const nextDate = new Date(currentDate.getTime() + offsetMinutes * 60000);
        if (!isHospitalOpen(hospitalCode, nextDate)) {
          return offsetMinutes;
        }
      }

      return null;
    }

    function createClosedState() {
      return { status: "geschlossen", mode: "closed", closeSoon: false };
    }

    function createOpenState(closeSoon = false) {
      return { status: "geöffnet", mode: "active", closeSoon };
    }

    function createRtlTimedFallbackState(currentDate) {
      return {
        chl: isHospitalOpen(CHL, currentDate)
          ? createOpenState((getMinutesUntilClose(CHL, currentDate) ?? 9999) <= 60)
          : createClosedState(),
        hoki: isHospitalOpen(HK, currentDate)
          ? createOpenState((getMinutesUntilClose(HK, currentDate) ?? 9999) <= 60)
          : createClosedState(),
        chem: createOpenState(),
        chdn: createOpenState(),
        footer: "RTL Zeiten"
      };
    }

    function getMonitorState(currentDate) {
      return {
        ...createRtlTimedFallbackState(currentDate),
        footer: "RTL Zeiten lokal"
      };
    }

    function applyCardState(element, status, mode) {
      element.classList.remove("hospital-card--closed", "hospital-card--active");
      element.classList.add(`hospital-card--${mode}`);
      element.querySelector(".hospital-card__status").textContent = status;
    }

    function applyRenderedState(state) {
      const chlStatus = state.chl.closeSoon && warningBlinkOn ? "schließt in Kürze" : state.chl.status;
      const hokiStatus = state.hoki.closeSoon && warningBlinkOn ? "schließt in Kürze" : state.hoki.status;
      const chdnStatus = state.chdn.closeSoon && warningBlinkOn ? "schließt in Kürze" : state.chdn.status;
      const chemStatus = state.chem.closeSoon && warningBlinkOn ? "schließt in Kürze" : state.chem.status;

      applyCardState(cards.chl, chlStatus, state.chl.mode);
      applyCardState(cards.hoki, hokiStatus, state.hoki.mode);
      applyCardState(cards.chdn, chdnStatus, state.chdn.mode);
      applyCardState(cards.chem, chemStatus, state.chem.mode);
    }

    function updateWarningBlink() {
      if (!currentRenderedState) {
        return;
      }

      warningBlinkOn = !warningBlinkOn;
      applyRenderedState(currentRenderedState);
    }

    function renderMonitor() {
      const snapshot = getLuxembourgSnapshot();
      const luxDate = snapshot.date;
      const monitorState = getMonitorState(luxDate);
      currentRenderedState = monitorState;
      applyRenderedState(monitorState);

      monitorFooter.textContent = `${snapshot.dateLabel} · ${monitorState.footer}`;
    }

    renderMonitor();
    setInterval(renderMonitor, 60000);
    setInterval(updateWarningBlink, 1000);
  </script>
</body>

</html>
