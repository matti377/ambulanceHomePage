    <style>
        .hero {
            text-align: center;
            margin-bottom: 24px;
        }

        .hero .logo {
            margin: 0 auto 16px;
        }

        .detail-card {
            background: var(--card-bg);
            color: var(--text-dark);
            border-radius: 18px;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.22);
        }

        .top-card {
            padding: 24px;
            margin-bottom: 20px;
            background: transparent;
            box-shadow: none;
            border-radius: 0;
            color: var(--text-light);
        }

        .top-actions,
        .doc-links {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 16px;
        }

        .top-actions .btn,
        .doc-links .btn,
        .detail-card .btn {
            width: auto;
        }

        .nav-links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 24px;
        }

        .nav-links a {
            color: var(--text-light);
            text-decoration: none;
            font-weight: 700;
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.16);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .details-grid {
            display: grid;
            gap: 22px;
            margin-bottom: 32px;
        }

        .detail-card {
            overflow: hidden;
        }

        .detail-head {
            color: #fff;
            padding: 20px;
        }

        .detail-head h2 {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.45rem;
        }

        .detail-tag {
            display: inline-block;
            margin-bottom: 12px;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.18);
            font-size: 0.86rem;
            font-weight: 700;
        }

        .detail-body {
            padding: 20px;
            display: grid;
            gap: 16px;
        }

        .detail-body p,
        .detail-body li {
            line-height: 1.65;
        }

        .detail-body ul {
            padding-left: 20px;
            display: grid;
            gap: 8px;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
        }

        .image-card {
            border: 1px solid rgba(0, 87, 184, 0.16);
            border-radius: 16px;
            overflow: hidden;
            background: rgba(0, 87, 184, 0.05);
        }

        .dark-theme .image-card {
            border-color: rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
        }

        .image-card img {
            display: block;
            width: 100%;
            height: auto;
            background: #fff;
            cursor: zoom-in;
        }

        .image-card figcaption {
            padding: 12px 14px;
            font-size: 0.95rem;
        }

        .lightbox {
            position: fixed;
            inset: 0;
            z-index: 1200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(0, 0, 0, 0.84);
        }

        .lightbox.is-open {
            display: flex;
        }

        .lightbox__backdrop {
            position: absolute;
            inset: 0;
        }

        .lightbox__panel {
            position: relative;
            z-index: 1;
            display: grid;
            gap: 12px;
            max-width: min(1100px, 100%);
            max-height: 100%;
        }

        .lightbox__image {
            max-width: 100%;
            max-height: 78vh;
            border-radius: 16px;
            background: #fff;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
        }

        .lightbox__caption {
            color: #fff;
            text-align: center;
            line-height: 1.5;
        }

        .lightbox__close {
            position: absolute;
            top: -12px;
            right: -12px;
            width: 42px;
            height: 42px;
            border: none;
            border-radius: 50%;
            background: var(--secondary);
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .theme-als { background: linear-gradient(135deg, #0057b8, #1d3557); }
        .theme-causes { background: linear-gradient(135deg, #5f0f40, #9a031e); }
        .theme-potassium { background: linear-gradient(135deg, #ef476f, #d62828); }
        .theme-temp { background: linear-gradient(135deg, #118ab2, #fb8500); }
        .theme-trauma { background: linear-gradient(135deg, #6b705c, #bc4749); }

        @media (max-width: 700px) {
            body { padding: 16px; }
            .top-actions .btn,
            .doc-links .btn,
            .detail-card .btn { width: 100%; }
        }
    </style>

        function applyVisualSettings() {
            if (window.ToolkitI18n && typeof window.ToolkitI18n.applyTranslations === 'function') {
                window.ToolkitI18n.applyTranslations({ translations: { de: {}, en: {}, fr: {}, lb: {} } });
            }
        }

        function currentLanguage() {
            if (window.ToolkitI18n && typeof window.ToolkitI18n.getStoredLanguage === 'function') {
                return window.ToolkitI18n.getStoredLanguage();
            }
            return 'de';
        }

        function openLightbox(src, alt) {
            const lightbox = document.getElementById('imageLightbox');
            const image = document.getElementById('lightboxImage');
            const caption = document.getElementById('lightboxCaption');
            if (!lightbox || !image || !caption) {
                return;
            }
            image.src = src;
            image.alt = alt;
            caption.textContent = alt;
            lightbox.classList.add('is-open');
            lightbox.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            const lightbox = document.getElementById('imageLightbox');
            const image = document.getElementById('lightboxImage');
            const caption = document.getElementById('lightboxCaption');
            if (!lightbox || !image || !caption) {
                return;
            }
            lightbox.classList.remove('is-open');
            lightbox.setAttribute('aria-hidden', 'true');
            image.src = '';
            image.alt = '';
            caption.textContent = '';
            document.body.style.overflow = '';
        }

        function bindImageClicks() {
            document.querySelectorAll('.image-card img').forEach((image) => {
                image.addEventListener('click', () => {
                    openLightbox(image.getAttribute('src'), image.getAttribute('alt') || '');
                });
            });
        }

        function render() {
            const language = currentLanguage();
            const content = CONTENT[language] || CONTENT.de;
            document.documentElement.lang = language;
            document.title = `🚑 ${content.title}`;

            const pageTitle = document.getElementById('pageTitle');
            if (pageTitle) pageTitle.textContent = content.title;

            const pageSubtitle = document.getElementById('pageSubtitle');
            if (pageSubtitle) pageSubtitle.textContent = content.subtitle;


            const backLink = document.getElementById('backLink');
            if (backLink) {
                backLink.textContent = content.back;
                backLink.href = './index.html';
            }

            const navLinks = document.getElementById('navLinks');
            if (navLinks) {
                navLinks.innerHTML = SECTIONS.map((section) => {
                    const local = content.sections[section.id];
                    return `<a href="#${section.id}">${local.title}</a>`;
                }).join('');
            }

            const detailsGrid = document.getElementById('detailsGrid');
            if (detailsGrid) {
                detailsGrid.innerHTML = SECTIONS.map((section) => {
                    const local = content.sections[section.id];
                    const bullets = local.bullets.map((item) => `<li>${item}</li>`).join('');
                    const images = section.images.map((file) => `
                        <figure class="image-card">
                            <img src="./images/${file}" alt="${content.captions[file]}" loading="lazy">
                            <figcaption>${content.captions[file]}</figcaption>
                        </figure>
                    `).join('');

                    return `
                        <article id="${section.id}" class="detail-card">
                            <div class="detail-head ${section.theme}">
                                <div class="detail-tag">${local.tag}</div>
                                <h2><i class="${section.icon}"></i><span>${local.title}</span></h2>
                            </div>
                            <div class="detail-body">
                                <p>${local.text}</p>
                                <ul>${bullets}</ul>
                                ${images ? `<div class="image-grid">${images}</div>` : ''}
                            </div>
                        </article>
                    `;
                }).join('');

                bindImageClicks();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            applyVisualSettings();
            render();

            const lightboxClose = document.getElementById('lightboxClose');
            if (lightboxClose) {
                lightboxClose.addEventListener('click', closeLightbox);
            }

            const lightboxBackdrop = document.querySelector('#imageLightbox .lightbox__backdrop');
            if (lightboxBackdrop) {
                lightboxBackdrop.addEventListener('click', closeLightbox);
            }

            document.addEventListener('keydown', (event) => {
                if (event.key === 'Escape') {
                    closeLightbox();
                }
            });
        });
    </script>
</body>

</html>
