<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxembourg Rescue Map</title>
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
    >
    <style>
        :root {
            color-scheme: light;
            --page-bg: linear-gradient(180deg, #edf4f8 0%, #dfe9f2 100%);
            --panel-bg: rgba(255, 255, 255, 0.88);
            --text-main: #17324d;
            --text-muted: #54708d;
            --shadow: 0 18px 40px rgba(17, 44, 74, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: var(--page-bg);
            color: var(--text-main);
        }

        .page-shell {
            min-height: 100vh;
            padding: 24px;
            display: grid;
            gap: 18px;
            grid-template-rows: auto 1fr;
        }

        .page-header {
            padding: 18px 20px;
            border-radius: 18px;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow);
        }

        .page-header h1 {
            margin: 0 0 6px;
            font-size: clamp(1.5rem, 2.2vw, 2.2rem);
        }

        .page-header p {
            margin: 0;
            color: var(--text-muted);
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            gap: 18px;
            align-items: end;
            flex-wrap: wrap;
        }

        .search-card {
            min-width: 280px;
            display: grid;
            gap: 8px;
        }

        .search-card label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .search-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-controls input {
            flex: 1 1 150px;
            min-width: 0;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid rgba(23, 50, 77, 0.16);
            font: inherit;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .search-controls button {
            padding: 12px 16px;
            border: 0;
            border-radius: 12px;
            background: #1976d2;
            color: #ffffff;
            font: inherit;
            font-weight: 600;
            cursor: pointer;
        }

        .search-controls .secondary-button {
            background: #ffffff;
            color: var(--text-main);
            border: 1px solid rgba(23, 50, 77, 0.16);
        }

        .search-feedback {
            min-height: 1.2em;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .map-frame {
            min-height: 70vh;
            border-radius: 22px;
            overflow: hidden;
            background: #c8d8e8;
            box-shadow: var(--shadow);
            position: relative;
        }

        #luxembourg-map {
            width: 100%;
            height: 100%;
            min-height: 70vh;
        }

        .custom-map-marker {
            background: transparent;
            border: 0;
        }

        .marker-pin {
            width: 18px;
            height: 18px;
            display: block;
            border-radius: 999px;
            background: var(--marker-color);
            border: 3px solid #ffffff;
            box-shadow: 0 0 0 1px rgba(20, 42, 63, 0.18), 0 6px 16px rgba(13, 33, 53, 0.28);
        }

        .user-location-marker {
            background: transparent;
            border: 0;
        }

        .user-location-dot,
        .user-location-pulse {
            position: absolute;
            inset: 0;
            border-radius: 999px;
        }

        .user-location-dot {
            width: 14px;
            height: 14px;
            inset: 4px;
            background: #2f80ed;
            border: 2px solid #ffffff;
            box-shadow: 0 0 0 1px rgba(47, 128, 237, 0.35);
        }

        .user-location-pulse {
            background: rgba(47, 128, 237, 0.18);
            animation: pulse-ring 1.8s ease-out infinite;
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(0.65);
                opacity: 0.95;
            }

            100% {
                transform: scale(1.45);
                opacity: 0;
            }
        }

        .leaflet-control-layers {
            border-radius: 14px;
            box-shadow: 0 12px 28px rgba(17, 44, 74, 0.18);
        }

        .status-message {
            position: absolute;
            inset: auto 18px 18px auto;
            z-index: 500;
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.92);
            color: var(--text-main);
            box-shadow: var(--shadow);
            font-size: 0.95rem;
        }

        @media (max-width: 768px) {
            .page-shell {
                padding: 14px;
            }

            .search-card {
                width: 100%;
            }

            .map-frame,
            #luxembourg-map {
                min-height: 78vh;
            }
        }
    </style>
</head>
<body>
    <main class="page-shell">
        <section class="page-header">
            <div class="header-row">
                <div>
                    <h1>Luxembourg Rescue Map</h1>
                </div>
                <div class="search-card">
                    <label for="rescue-point-id">Search rescue point</label>
                    <div class="search-controls">
                        <input
                            id="rescue-point-id"
                            name="rescuePointId"
                            type="text"
                            inputmode="text"
                            placeholder="AA-000"
                            maxlength="6"
                            pattern="[A-Z]{2}-[0-9]{3}"
                            aria-describedby="rescue-point-feedback"
                        >
                        <button id="rescue-point-button" type="button">Find</button>
                        <button id="user-location-button" class="secondary-button" type="button">My position</button>
                    </div>
                    <div id="rescue-point-feedback" class="search-feedback">Format: two letters, hyphen, three numbers.</div>
                </div>
            </div>
        </section>
        <section class="map-frame">
            <div id="luxembourg-map" aria-label="Interactive map of Luxembourg"></div>
            <div id="map-status" class="status-message">Loading map data...</div>
        </section>
    </main>

    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
    ></script>
    <script type="module">
        import { initMap } from "./initMap.js";

        const status = document.getElementById("map-status");

        initMap()
            .then(() => {
                if (status) {
                    status.textContent = "Map ready";
                    window.setTimeout(() => status.remove(), 1600);
                }
            })
            .catch((error) => {
                console.error("Unable to initialize Luxembourg rescue map.", error);
                if (status) {
                    status.textContent = "Map data could not be loaded";
                }
            });
    </script>
</body>
</html>
